<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Upload Photo API - Reporte Urbano</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: white;
            border-radius: 16px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 24px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        input, select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            width: 100%;
        }
        .file-input-wrapper input[type=file] {
            position: absolute;
            left: -9999px;
        }
        .file-input-label {
            display: block;
            padding: 12px 16px;
            background: #f5f5f5;
            border: 2px dashed #ccc;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .file-input-label:hover {
            background: #efefef;
            border-color: #667eea;
        }
        .file-preview {
            margin-top: 15px;
            display: none;
        }
        .file-preview img {
            max-width: 100%;
            border-radius: 8px;
            border: 2px solid #e0e0e0;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .result {
            margin-top: 30px;
            padding: 20px;
            border-radius: 8px;
            display: none;
        }
        .result.success {
            background: #d4edda;
            border: 2px solid #28a745;
            color: #155724;
        }
        .result.error {
            background: #f8d7da;
            border: 2px solid #dc3545;
            color: #721c24;
        }
        .result-title {
            font-weight: 700;
            margin-bottom: 10px;
            font-size: 16px;
        }
        .result-content {
            font-family: 'Courier New', monospace;
            font-size: 13px;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .info-box {
            background: #fff3cd;
            border: 2px solid #ffc107;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 25px;
            font-size: 13px;
            color: #856404;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧪 Test Upload Photo API</h1>
        <p class="subtitle">Prueba el endpoint de sincronización de fotos</p>

        <div class="info-box">
            <strong>⚠️ Importante:</strong> Este es un tester para verificar que el endpoint funciona correctamente. Asegúrate de tener una incidencia existente en la DB.
        </div>

        <form id="uploadForm">
            <div class="form-group">
                <label for="incidenciaId">ID de Incidencia</label>
                <input type="number" id="incidenciaId" name="incidencia_id" required min="1" placeholder="Ej: 1">
            </div>

            <div class="form-group">
                <label for="apiKey">API Key</label>
                <input type="text" id="apiKey" name="api_key" required placeholder="tu_clave_secreta_aqui_MD5">
            </div>

            <div class="form-group">
                <label for="tipo">Tipo de Foto</label>
                <select id="tipo" name="tipo">
                    <option value="despues">Después (foto_despues)</option>
                    <option value="antes">Antes (foto)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="foto">Seleccionar Foto</label>
                <div class="file-input-wrapper">
                    <input type="file" id="foto" name="foto" accept="image/*" required>
                    <label for="foto" class="file-input-label">
                        📷 Click para seleccionar imagen
                    </label>
                </div>
                <div class="file-preview" id="filePreview">
                    <img id="previewImg" src="" alt="Preview">
                </div>
            </div>

            <button type="submit" id="submitBtn">🚀 Enviar Foto</button>
        </form>

        <div class="result" id="result">
            <div class="result-title" id="resultTitle"></div>
            <div class="result-content" id="resultContent"></div>
        </div>
    </div>

    <script>
        const form = document.getElementById('uploadForm');
        const fotoInput = document.getElementById('foto');
        const fileLabel = document.querySelector('.file-input-label');
        const filePreview = document.getElementById('filePreview');
        const previewImg = document.getElementById('previewImg');
        const submitBtn = document.getElementById('submitBtn');
        const result = document.getElementById('result');
        const resultTitle = document.getElementById('resultTitle');
        const resultContent = document.getElementById('resultContent');

        // Preview de imagen
        fotoInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                fileLabel.textContent = `✅ ${file.name}`;
                const reader = new FileReader();
                reader.onload = (e) => {
                    previewImg.src = e.target.result;
                    filePreview.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        });

        // Submit form
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const formData = new FormData();
            formData.append('foto', fotoInput.files[0]);
            formData.append('incidencia_id', document.getElementById('incidenciaId').value);
            formData.append('api_key', document.getElementById('apiKey').value);
            formData.append('tipo', document.getElementById('tipo').value);

            submitBtn.disabled = true;
            submitBtn.textContent = '⏳ Enviando...';
            result.style.display = 'none';

            try {
                const response = await fetch('https://reporteurbano.site/public/api/upload_photo.php', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (response.ok && data.ok) {
                    result.className = 'result success';
                    resultTitle.textContent = '✅ Éxito';
                    resultContent.textContent = JSON.stringify(data, null, 2);
                } else {
                    result.className = 'result error';
                    resultTitle.textContent = '❌ Error';
                    resultContent.textContent = JSON.stringify(data, null, 2);
                }
            } catch (error) {
                result.className = 'result error';
                resultTitle.textContent = '❌ Error de Conexión';
                resultContent.textContent = error.message;
            } finally {
                result.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.textContent = '🚀 Enviar Foto';
            }
        });

        // Cargar API key del localStorage si existe
        const savedApiKey = localStorage.getItem('apiKey');
        if (savedApiKey) {
            document.getElementById('apiKey').value = savedApiKey;
        }

        // Guardar API key en submit
        form.addEventListener('submit', () => {
            const apiKey = document.getElementById('apiKey').value;
            localStorage.setItem('apiKey', apiKey);
        });
    </script>
</body>
</html>
